<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph — LinkedIn generates preview from these -->
    <meta property="og:title" content="Contact Maxim Kudryavtsev via WhatsApp" />
    <meta property="og:description" content="Senior Backend Engineer — Click to connect on WhatsApp" />
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" />
    <meta property="og:type" content="website" />

    <title>Contact Maxim Kudryavtsev — WhatsApp</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .avatar {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
        }
        .name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .role {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 0.2rem;
        }
        .tagline {
            font-size: 0.85rem;
            opacity: 0.75;
            margin-bottom: 1.5rem;
            font-style: italic;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.25);
            margin: 0 1rem 1.5rem;
        }
        .redirect-label {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fallback {
            font-size: 0.9rem;
            opacity: 0.85;
        }
        .fallback a {
            color: #fff;
            text-decoration: underline;
            font-weight: 600;
        }
        .wa-icon {
            font-size: 1.4rem;
            vertical-align: middle;
            margin-right: 0.3rem;
        }
        .noscript-msg {
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">MK</div>
        <div class="name">Maxim Kudryavtsev</div>
        <div class="role">Senior Backend Engineer</div>
        <div class="tagline">Building scalable application backends with AI integrations</div>

        <div class="divider"></div>

        <div class="spinner" id="spinner"></div>
        <div class="redirect-label">Redirecting to WhatsApp...</div>

        <div class="fallback">
            Not redirected? <a id="fallback-link" href="#">Open WhatsApp</a>
        </div>

        <noscript>
            <div class="noscript-msg">
                JavaScript is disabled. Please enable it or manually send a message
                to the phone number listed on my LinkedIn profile.
            </div>
        </noscript>
    </div>

    <script>
        var _s = ["=","=","w","N","1","M","T","M","3","c","T","N","x","I","T","N","x","k","D","N"]
        var _q = function rev1(params) {
            return _s.reverse()
        }

        var _p = atob(_q().join(''));

        var _m = encodeURIComponent(
            "Hi Maxim, I found your profile on LinkedIn and would like to discuss a potential opportunity."
        );

        // ============================================================
        // Build WhatsApp URL and redirect
        // ============================================================
        var _u = "https://wa.me/" + _p + "?text=" + _m;

        // Set fallback link
        document.getElementById("fallback-link").href = _u;

        // Redirect after 1.5s — user sees the interstitial page
        setTimeout(function () {
            window.location.href = _u;
        }, 1500000);
    </script>
</body>
</html>
